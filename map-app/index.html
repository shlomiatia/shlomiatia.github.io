<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Map</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 12px 16px;
            background: #1a73e8;
            color: white;
            flex-shrink: 0;
            z-index: 10;
        }

        header h1 { font-size: 1.2rem; margin-bottom: 8px; }

        .search-row { display: flex; gap: 8px; }

        .search-row input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            font-size: 1rem;
            outline: none;
        }

        .search-row button {
            padding: 8px 20px;
            background: white;
            color: #1a73e8;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            white-space: nowrap;
        }

        .search-row button:hover { background: #e8f0fe; }
        .search-row button:disabled { opacity: 0.5; cursor: not-allowed; }

        #map { flex: 1; min-height: 0; }

        #location-list {
            flex-shrink: 0;
            max-height: 220px;
            overflow-y: auto;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .location-item {
            display: flex;
            align-items: center;
            padding: 9px 16px;
            border-bottom: 1px solid #e8eaed;
            gap: 8px;
        }

        .location-item:hover { background: #e8f0fe; }

        .location-name {
            flex: 1;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
            color: #202124;
        }

        .location-sub {
            font-size: 0.75rem;
            color: #5f6368;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .location-text { flex: 1; overflow: hidden; cursor: pointer; }

        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #9aa0a6;
            font-size: 1rem;
            padding: 2px 6px;
            border-radius: 4px;
            line-height: 1;
            flex-shrink: 0;
        }

        .delete-btn:hover { color: #e53935; background: #fce4ec; }

        .empty-state {
            padding: 20px;
            text-align: center;
            color: #9aa0a6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Shared Map</h1>
    <div class="search-row">
        <input type="text" id="search" placeholder="Search for a place..." autocomplete="off" />
        <button id="add-btn" onclick="addLocation()">Add</button>
    </div>
</header>

<div id="map"></div>
<div id="location-list"><p class="empty-state">No locations yet.</p></div>

<script>
// ── Firebase config ───────────────────────────────────────────────────────────
const firebaseConfig = {
    apiKey:            "AIzaSyApSFwx38AJBHf--LEw-N7T65LM895t9IM",
    authDomain:        "map-app-e6447.firebaseapp.com",
    databaseURL:       "https://map-app-e6447-default-rtdb.firebaseio.com",
    projectId:         "map-app-e6447",
    storageBucket:     "map-app-e6447.firebasestorage.app",
    messagingSenderId: "116981374933",
    appId:             "1:116981374933:web:da7e8ba291d7c8878ca75c"
};
// ─────────────────────────────────────────────────────────────────────────────

firebase.initializeApp(firebaseConfig);
const locationsRef = firebase.database().ref('locations');

let map, autocomplete;
const markers = {};

function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 20, lng: 0 },
        zoom: 2,
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: false,
    });

    autocomplete = new google.maps.places.Autocomplete(
        document.getElementById('search'),
        { fields: ['name', 'formatted_address', 'geometry'] }
    );

    // Prevent form submit on Enter inside autocomplete
    autocomplete.addListener('place_changed', () => {});

    // Sync locations from Firebase in real-time
    locationsRef.on('value', snapshot => {
        Object.values(markers).forEach(m => m.setMap(null));
        Object.keys(markers).forEach(k => delete markers[k]);

        const list = document.getElementById('location-list');
        list.innerHTML = '';

        if (!snapshot.exists()) {
            list.innerHTML = '<p class="empty-state">No locations yet.</p>';
            return;
        }

        snapshot.forEach(child => {
            placeMarker(child.key, child.val());
            appendItem(child.key, child.val());
        });
    });
}

function placeMarker(id, loc) {
    const marker = new google.maps.Marker({
        map,
        position: { lat: loc.lat, lng: loc.lon },
        title: loc.name,
    });
    const infoWindow = new google.maps.InfoWindow({
        content: `<b>${loc.name}</b><br><small>${loc.address}</small>`
    });
    marker.addListener('click', () => infoWindow.open(map, marker));
    markers[id] = marker;
}

function appendItem(id, loc) {
    const list = document.getElementById('location-list');
    const item = document.createElement('div');
    item.className = 'location-item';
    item.innerHTML = `
        <div class="location-text">
            <div class="location-name">${loc.name}</div>
            <div class="location-sub">${loc.address}</div>
        </div>
        <button class="delete-btn" title="Remove">✕</button>
    `;
    item.querySelector('.location-text').onclick = () => {
        map.setCenter({ lat: loc.lat, lng: loc.lon });
        map.setZoom(13);
        google.maps.event.trigger(markers[id], 'click');
    };
    item.querySelector('.delete-btn').onclick = () =>
        locationsRef.child(id).remove();
    list.appendChild(item);
}

function addLocation() {
    const place = autocomplete.getPlace();

    if (!place || !place.geometry) {
        alert('Please select a location from the dropdown suggestions.');
        return;
    }

    locationsRef.push({
        name: place.name,
        address: place.formatted_address,
        lat: place.geometry.location.lat(),
        lon: place.geometry.location.lng(),
        addedAt: Date.now()
    });

    document.getElementById('search').value = '';
}
</script>

<!-- ── Replace YOUR_GOOGLE_MAPS_API_KEY below ─────────────────────────────────
     Get a key at https://console.cloud.google.com → APIs & Services → Credentials
     Enable: Maps JavaScript API + Places API
     Restrict key to: https://shlomiatia.github.io/*
     ────────────────────────────────────────────────────────────────────────── -->
<script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD-Fs02V2ud_nGahJNFCHF4kuOIBAS1TDs&libraries=places&callback=initMap">
</script>

</body>
</html>
