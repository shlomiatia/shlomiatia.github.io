<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 12px 16px;
            background: #1a73e8;
            color: white;
            flex-shrink: 0;
        }

        header h1 { font-size: 1.2rem; margin-bottom: 8px; }

        .search-row { display: flex; gap: 8px; }

        .search-row input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            font-size: 1rem;
            outline: none;
        }

        .search-row button {
            padding: 8px 20px;
            background: white;
            color: #1a73e8;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }

        .search-row button:hover { background: #e8f0fe; }
        .search-row button:disabled { opacity: 0.5; cursor: not-allowed; }

        #map { flex: 1; min-height: 0; }

        #location-list {
            flex-shrink: 0;
            max-height: 220px;
            overflow-y: auto;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .location-item {
            display: flex;
            align-items: center;
            padding: 9px 16px;
            border-bottom: 1px solid #e8eaed;
            gap: 8px;
        }

        .location-item:hover { background: #e8f0fe; }

        .location-name {
            flex: 1;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
            color: #202124;
        }

        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #9aa0a6;
            font-size: 1rem;
            padding: 2px 6px;
            border-radius: 4px;
            line-height: 1;
            flex-shrink: 0;
        }

        .delete-btn:hover { color: #e53935; background: #fce4ec; }

        .empty-state {
            padding: 20px;
            text-align: center;
            color: #9aa0a6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Shared Map</h1>
    <div class="search-row">
        <input type="text" id="search" placeholder="Search for a place..." autocomplete="off" />
        <button id="add-btn" onclick="addLocation()">Add</button>
    </div>
</header>

<div id="map"></div>
<div id="location-list"><p class="empty-state">No locations yet.</p></div>

<script>
// ── Firebase config ───────────────────────────────────────────────────────────
// 1. Go to https://console.firebase.google.com and create a project
// 2. Add a web app, copy the config object here
// 3. Go to Realtime Database → Create database → Start in test mode
const firebaseConfig = {
    apiKey:            "AIzaSyApSFwx38AJBHf--LEw-N7T65LM895t9IM",
    authDomain:        "map-app-e6447.firebaseapp.com",
    databaseURL:       "https://map-app-e6447-default-rtdb.firebaseio.com",
    projectId:         "map-app-e6447",
    storageBucket:     "map-app-e6447.firebasestorage.app",
    messagingSenderId: "116981374933",
    appId:             "1:116981374933:web:da7e8ba291d7c8878ca75c"
};
// ─────────────────────────────────────────────────────────────────────────────

firebase.initializeApp(firebaseConfig);
const locationsRef = firebase.database().ref('locations');

// Map setup
const map = L.map('map').setView([20, 0], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(map);

const markers = {};

// Sync all locations from Firebase in real-time
locationsRef.on('value', snapshot => {
    Object.values(markers).forEach(m => map.removeLayer(m));
    Object.keys(markers).forEach(k => delete markers[k]);

    const list = document.getElementById('location-list');
    list.innerHTML = '';

    if (!snapshot.exists()) {
        list.innerHTML = '<p class="empty-state">No locations yet.</p>';
        return;
    }

    snapshot.forEach(child => {
        const loc = child.val();
        placeMarker(child.key, loc);
        appendItem(child.key, loc);
    });
});

function placeMarker(id, loc) {
    const marker = L.marker([loc.lat, loc.lon])
        .addTo(map)
        .bindPopup(`<b>${loc.query}</b><br><small>${loc.name}</small>`);
    markers[id] = marker;
}

function appendItem(id, loc) {
    const list = document.getElementById('location-list');
    const item = document.createElement('div');
    item.className = 'location-item';
    item.innerHTML = `
        <span class="location-name" title="${loc.name}">${loc.query}</span>
        <button class="delete-btn" title="Remove">✕</button>
    `;
    item.querySelector('.location-name').onclick = () => {
        map.setView([loc.lat, loc.lon], 13);
        markers[id]?.openPopup();
    };
    item.querySelector('.delete-btn').onclick = () =>
        locationsRef.child(id).remove();
    list.appendChild(item);
}

async function addLocation() {
    const input = document.getElementById('search');
    const btn = document.getElementById('add-btn');
    const query = input.value.trim();
    if (!query) return;

    btn.disabled = true;
    btn.textContent = '…';

    try {
        const res = await fetch(
            `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`
        );
        const results = await res.json();

        if (!results.length) {
            alert('Location not found — try a more specific name.');
            return;
        }

        const { lat, lon, display_name } = results[0];
        await locationsRef.push({
            query,
            name: display_name,
            lat: parseFloat(lat),
            lon: parseFloat(lon),
            addedAt: Date.now()
        });

        input.value = '';
    } catch {
        alert('Something went wrong — please try again.');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Add';
    }
}

document.getElementById('search').addEventListener('keydown', e => {
    if (e.key === 'Enter') addLocation();
});
</script>

</body>
</html>
